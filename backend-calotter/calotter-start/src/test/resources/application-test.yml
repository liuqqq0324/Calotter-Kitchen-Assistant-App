spring:
  application:
    name: calotter-test
  
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
        enable_lazy_load_no_trans: true

server:
  port: 0 # 随机端口，避免冲突

jwt:
  key: TestJwtKeyForIntegrationTestingThatShouldBeAtLeast32CharactersLong!
  issuer: CalotterBackend
  audience: CalotterFrontend
  expiration: 3000

# AI API配置（测试时使用 spring-ai-gemini，Mock 模式已删除）
ai:
  api:
    mode: spring-ai-gemini  # 使用 Spring AI Gemini 实现
    gemini:
      api-key: test-api-key
      base-url: http://localhost:9999
      model: test-model
  nutrition:
    provider: gemini
    gemini:
      base-url: http://localhost:9999
      api-key: test-api-key
      model: test-model

logging:
  level:
    root: WARN
    com.calotter: DEBUG
    org.springframework.web: DEBUG

