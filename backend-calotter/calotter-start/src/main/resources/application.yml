spring:
  application:
    name: calotter
  
  datasource:
    url: jdbc:postgresql://localhost:5432/calotter
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true
  
  # Spring AI Google GenAI 配置
  ai:
    # 🔥 禁用自动重试，防止 429 错误时重复请求导致配额耗尽
    retry:
      max-attempts: 1  # 禁止自动重试，由我们自己的代码控制
      enabled: false    # 或者直接禁用
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: gemini-2.5-flash-lite
            temperature: 0.9  # ✅ 方案一：调高温度增加随机性和多样性，减少同质化
            top-p: 0.95  # ✅ 方案一：设置 Top-P 防止在高温度下胡言乱语
            # 注意：Spring AI Google GenAI 通过结构化输出功能支持 Function Calling
            # response-format 可能不需要单独配置，Spring AI 会自动处理
  # 营养估算器配置
  nutrition:
    provider: groq  # groq（Groq 是唯一可用的实现）
    # Gemini 配置
    gemini:
      base-url: https://generativelanguage.googleapis.com
      api-key: ${GEMINI_API_KEY:}  # 复用同一个 API Key
      model: gemini-2.5-flash-lite
    # Groq 配置（保留）
    groq:
      base-url: https://api.groq.com
      api-key: ${GROQ_API_KEY:}
      model: llama-3.3-70b-versatile

server:
  port: 8080
  address: 0.0.0.0  # 🔥 监听所有网络接口，允许外部连接（AWS 公网 IP 访问必需）

logging:
  level:
    root: INFO
    com.calotter: DEBUG
    # 🔍 DEBUG: 临时关闭 Hibernate SQL 日志以便查看 category 相关日志
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN

jwt:
  key: YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast32CharactersLong!
  issuer: CalotterBackend
  audience: CalotterFrontend
  expiration: 3000 # seconds (50 minutes)

# AI API 配置
# 模式选择：spring-ai-gemini（Spring AI Gemini，使用 Function Calling，默认）
# 已废除：mock、groq 和 bedrock 模式
ai:
  api:
    mode: spring-ai-gemini  # spring-ai-gemini（默认，唯一可用）
