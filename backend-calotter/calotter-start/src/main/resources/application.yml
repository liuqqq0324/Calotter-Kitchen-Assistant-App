spring:
  application:
    name: calotter
  
  datasource:
    url: jdbc:postgresql://localhost:5432/calotter
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        use_sql_comments: true

server:
  port: 8080

logging:
  level:
    root: INFO
    com.calotter: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

jwt:
  key: YourSuperSecretKeyForJWTTokenGenerationThatShouldBeAtLeast32CharactersLong!
  issuer: CalotterBackend
  audience: CalotterFrontend
  expiration: 3000 # seconds (50 minutes)

# AI API 配置
# 模式选择：mock（开发测试，默认）/ gemini（优化版，简化 Prompt）/ groq（完整 Prompt）
ai:
  api:
    mode: bedrock  # mock / gemini / groq（当前使用 groq 进行测试）
    # Gemini 配置（优化版 - 简化 Prompt 减少 Token）
    gemini:
      api-key: ${GEMINI_API_KEY:}   # 从环境变量读取，如果不存在则为空
      base-url: https://generativelanguage.googleapis.com
      model: gemini-2.5-pro
    # Groq 配置（完整 Prompt 版本）
    groq:
      api-key: ${GROQ_API_KEY:}  # 从环境变量读取
      url: https://api.groq.com/openai/v1/chat/completions
      model: llama-3.3-70b-versatile
    # AWS Bedrock 配置（short-term Bearer token）
    # ⚠️ 不要把 token 写进仓库！用环境变量 BEDROCK_API_KEY 注入
    # Token 过期后重新在 AWS 控制台获取，再 export 更新即可
    bedrock:
      api-key: ${BEDROCK_API_KEY:}  # 从环境变量读取（短期 token）
      region: us-east-1
      model-id: us.meta.llama3-3-70b-instruct-v1:0  # Llama 3.3 70B Instruct (Inference Profile ID)
      max-tokens: 4096
      temperature: 0.2
      top-p: 0.9
  # 营养估算器配置
  nutrition:
    provider: gemini  # gemini 或 groq（默认 gemini）
    # Gemini 配置
    gemini:
      base-url: https://generativelanguage.googleapis.com
      api-key: ${GEMINI_API_KEY:}  # 复用同一个 API Key
      model: gemini-2.5-pro
    # Groq 配置（保留）
    groq:
      base-url: https://api.groq.com
      api-key: ${GROQ_API_KEY:}
      model: llama-3.3-70b-versatile