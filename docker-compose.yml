version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: souschef_postgres
    environment:
      POSTGRES_DB: souschef_db
      POSTGRES_USER: chef
      POSTGRES_PASSWORD: chef_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chef"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

