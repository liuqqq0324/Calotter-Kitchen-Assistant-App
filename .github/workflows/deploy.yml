name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**" # 允许所有分支触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Maven 构建
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        # 注意：请确保 GitHub Secrets 里配置的名字是 SERVER_HOST 还是 SERVER_IP
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3

    # 5. 远程重启服务 (防自杀版：按端口关闭)
    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Deployment script started..."
          
          # 1. 释放 8080 端口 (确保 fuser 工具已安装，没有就装一个)
          echo "Freeing port 8080..."
          # 尝试安装 psmisc (包含 fuser)，防止报错
          sudo apt-get update && sudo apt-get install -y psmisc
          # 杀掉占用 8080 的进程
          sudo fuser -k 8080/tcp || true
          
          # 等待端口彻底释放
          sleep 5
          
          # 2. 进入目录
          cd /opt/calotter
          
          # 3. 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          echo "Starting $JAR_NAME ..."
          
          # 4. 后台启动 (带上数据库密码)
          nohup java -jar $JAR_NAME \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/calotter \
            --spring.datasource.username=postgres \
            --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
            > app.log 2>&1 &
            
          echo "Deployment finished successfully!"