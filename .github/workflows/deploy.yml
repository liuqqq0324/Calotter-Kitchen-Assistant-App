name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 👇 修正点 1：进到两层目录里去执行 Maven
    - name: Build with Maven
      run: mvn -B clean package -DskipTests
      working-directory: ./backend-calotter/calotter-start

    # 👇 修正点 2：拿货的路径也要跟着改，否则会传空文件
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        # 注意这里路径变长了
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3 # 👈 注意！这里改成了 3，因为我们要剥离掉前面 3 层目录 (backend/calotter/target)

    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Stopping old process..."
          sudo pkill -f calotter || true
          sleep 2
          
          cd /opt/calotter
          JAR_NAME=$(ls -t *.jar | head -1)
          
          echo "Starting $JAR_NAME..."
          nohup java -jar $JAR_NAME > app.log 2>&1 &
          
          echo "Deployment finished!"