name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 👇👇👇 核心修改在这里 👇👇👇
    # 1. 目录：进入 backend-calotter (父级 POM 所在的地方)
    # 2. 命令：使用 'install' 而不是 'package'。
    #    这会触发 Reactor 机制：先编译 Common -> 存入仓库 -> 再编译 Modules -> 再编译 Start
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 👇 拿货路径：去 calotter-start 下面拿最终产物
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3 

    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Stopping old process..."
          sudo pkill -f calotter || true
          sleep 2
          
          cd /opt/calotter
          JAR_NAME=$(ls -t *.jar | head -1)
          
          echo "Starting $JAR_NAME..."
          nohup java -jar $JAR_NAME > app.log 2>&1 &
          
          echo "Deployment finished!"