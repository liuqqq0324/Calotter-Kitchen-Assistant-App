name: Deploy Spring Boot to AWS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境 (Spring Boot 3 必需)
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven # 开启缓存，第二次构建会快很多

    # 3. Maven 打包 (跳过测试以节省时间)
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 2 # 去掉路径前缀，直接把 jar 放在 /opt/calotter 下

    # 5. 远程重启服务
    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          # 停止旧服务 (如果存在)
          echo "Stopping old process..."
          pkill -f calotter || true
          
          # 等待2秒释放端口
          sleep 2
          
          # 进入目录
          cd /opt/calotter
          
          # 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          
          # 后台启动服务，并将日志输出到 app.log
          echo "Starting $JAR_NAME..."
          nohup java -jar $JAR_NAME > app.log 2>&1 &
          
          echo "Deployment finished!"