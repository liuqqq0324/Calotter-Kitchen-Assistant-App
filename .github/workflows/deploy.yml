name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**" # 允许所有分支触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Maven 构建
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        # 注意：请确保 GitHub Secrets 里配置的名字是 SERVER_HOST 还是 SERVER_IP
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3

    # 5. 远程重启服务 (核心修改在这里 👇)
    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Stopping old process..."
          # 强制杀掉旧的 java 进程
          sudo pkill -f 'java -jar' || true
          
          # 等待端口释放
          sleep 5
          
          # 进入存放 jar 包的目录 (根据你第4步的 target 设定)
          cd /opt/calotter
          
          # 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          
          echo "Starting $JAR_NAME with DB config..."
          
          # 🌟 关键修改：注入数据库配置 🌟
          # 使用 nohup 后台启动，并引用 secrets.DB_PASSWORD
          nohup java -jar $JAR_NAME \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/calotter \
            --spring.datasource.username=postgres \
            --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
            > app.log 2>&1 &
          
          echo "Deployment finished! Application is starting in background."