name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**" # 允许所有分支触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Maven 构建
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        # 注意：请确保 GitHub Secrets 里配置的名字是 SERVER_HOST 还是 SERVER_IP
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3

    # 5. 远程重启服务 (极简稳定版)
    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Deployment script started..."
          
          # 1. 进入目录
          cd /opt/calotter
          
          # 2. 只有检测到有 Java 在跑才杀进程 (避免空杀导致报错)
          # 使用 if 判断，比直接运行 pkill 更稳妥
          if pgrep -f "java -jar"; then
            echo "Found running process, killing it..."
            pkill -9 -f "java -jar"
          else
            echo "No running process found (Clean server)."
          fi
          
          # 3. 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          echo "Starting $JAR_NAME ..."
          
          # 4. 后台启动 (移除 drop_caches，那个命令太危险)
          nohup java -jar $JAR_NAME \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/calotter \
            --spring.datasource.username=postgres \
            --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
            > app.log 2>&1 &
            
          echo "Deployment finished successfully!"