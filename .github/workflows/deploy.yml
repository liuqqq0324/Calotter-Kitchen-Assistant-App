name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**" # 允许所有分支触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Maven 构建
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        # 注意：请确保 GitHub Secrets 里配置的名字是 SERVER_HOST 还是 SERVER_IP
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3

    # 5. 远程重启服务 (优化版：增加超时设置 + 暴力清理)
    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        command_timeout: 30m # 🔴 关键修改：设置 30 分钟超时，防止因服务器卡顿导致 GitHub 报错断开
        script: |
          echo "Starting deployment script..."
          
          # 1. 暴力清理旧进程 (-9 表示强制立即执行，不耗费 CPU 等待)
          echo "Force killing old process..."
          sudo pkill -9 -f 'java -jar' || true
          
          # 2. 清理一点缓存
          sudo sync && sudo sysctl -w vm.drop_caches=3 || true
          
          # 3. 进入目录
          cd /opt/calotter
          
          # 4. 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          echo "Deploying $JAR_NAME ..."
          
          # 5. 后台启动 (带上数据库密码)
          nohup java -jar $JAR_NAME \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/calotter \
            --spring.datasource.username=postgres \
            --spring.datasource.password=${{ secrets.DB_PASSWORD }} \
            > app.log 2>&1 &
            
          echo "Deployment command finished. Check app.log for details."