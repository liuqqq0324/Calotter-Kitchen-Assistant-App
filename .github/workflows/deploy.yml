name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "yhua" # 允许所有分支触发

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Maven 构建
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 👇 每次部署前，自动清理旧的 jar 包和缓存，防止磁盘写满
    - name: Pre-cleanup Disk Space
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Cleaning up disk space..."
          # 1. 强制删除旧的 jar 包 (关键!)
          rm -f /opt/calotter/*.jar
          # 2. 清理 apt 缓存
          sudo apt-get clean
          # 3. 检查空间
          df -h

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        # 注意：请确保 GitHub Secrets 里配置的名字是 SERVER_HOST 还是 SERVER_IP
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3

    # 5. 远程重启服务 (防自杀版：按端口关闭 + 环境变量注入)
    - name: Restart Application
      uses: appleboy/ssh-action@master
      env:
        # 把 Secrets 注入到当前 step，这样 envs 才能把它们传到远程脚本
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        GEMINI_PROJECT_ID: ${{ secrets.GEMINI_PROJECT_ID }}
        GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        # 把这几个变量从 runner 传到远程服务器的脚本环境
        envs: DB_PASSWORD,GEMINI_API_KEY,GEMINI_PROJECT_ID,GROQ_API_KEY
        script: |
          echo "Deployment script started..."
          
          # 在服务器里把传进来的变量变成真正的“环境变量”，System.getenv() 才能读到
          export DB_PASSWORD=$DB_PASSWORD
          export GEMINI_API_KEY=$GEMINI_API_KEY
          export GEMINI_PROJECT_ID=$GEMINI_PROJECT_ID
          export GROQ_API_KEY=$GROQ_API_KEY
          
          # 释放 8080 端口
          echo "Freeing port 8080..."
          sudo apt-get update && sudo apt-get install -y psmisc
          sudo fuser -k 8080/tcp || true
          sleep 5
          
          # 进入目录
          cd /opt/calotter
          
          # 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          echo "Starting $JAR_NAME ..."
          
          # 后台启动（API Key 等已通过 export 注入，程序从环境变量读取，无需写在命令里）
          nohup java -jar $JAR_NAME \
            --spring.datasource.url=jdbc:postgresql://localhost:5432/calotter \
            --spring.datasource.username=postgres \
            --spring.datasource.password=$DB_PASSWORD \
            > app.log 2>&1 &
            
          echo "Deployment finished successfully!"