name: Deploy Spring Boot to AWS

on:
  push:
    branches:
      - "**" # 允许所有分支触发，方便调试

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. 拉取代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. 设置 Java 17 环境
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # 3. Maven 构建 (在父目录执行 install)
    # 使用 install 确保 common/modules 模块能被正确引用
    - name: Build with Maven
      run: mvn -B clean install -DskipTests
      working-directory: ./backend-calotter

    # 4. 把打好的 Jar 包传到服务器
    - name: Copy Jar to Server
      uses: appleboy/scp-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "backend-calotter/calotter-start/target/*.jar"
        target: "/opt/calotter"
        strip_components: 3 # 剥离掉 backend-calotter/calotter-start/target 这3层目录

    # 5. 远程重启服务
    - name: Restart Application
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          echo "Stopping old process..."
          
          # 🌟 终极修复：不再匹配文字，直接杀掉 java 进程
          # 不加 -f 参数，它就只会看进程名叫不叫 java，不会看命令行参数
          # 这样绝对不会杀掉部署脚本自己 (因为脚本叫 bash)
          sudo pkill java || true
          
          # 等待端口释放
          sleep 5
          
          cd /opt/calotter
          
          # 找到最新的 jar 包
          JAR_NAME=$(ls -t *.jar | head -1)
          
          echo "Starting $JAR_NAME..."
          
          # 后台启动
          nohup java -jar $JAR_NAME > app.log 2>&1 &
          
          echo "Deployment finished!"